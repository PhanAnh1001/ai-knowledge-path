# =============================================================================
# AI Knowledge Path — Docker Compose DEV
# 2 containers: postgres + go-app
#
# Khởi động:  docker compose up -d
# Logs:       docker compose logs -f app
# Backend dev (hot reload): cd backend-go && go run ./cmd/server
# Frontend dev:             cd frontend && npm run dev
# =============================================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: awb-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ai-knowledge-path}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Go Backend ───────────────────────────────────────────────────────────────
  app:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: awb-app-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:          "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai-knowledge-path}"
      PORT:                  "8080"
      JWT_SECRET:            ${JWT_SECRET:-dev_secret_at_least_32_characters_long!!}
      JWT_EXPIRATION_MS:     "86400000"
      JWT_REFRESH_EXPIRATION_MS: "2592000000"
      CORS_ALLOWED_ORIGINS:  "http://localhost:5173,http://localhost:3000"
      RATE_LIMIT_MAX:        "100"
      RATE_LIMIT_WINDOW:     "60"
      MIGRATIONS_PATH:       /app/internal/db/migrations
    ports:
      - "8080:8080"

volumes:
  pg_data_dev:
