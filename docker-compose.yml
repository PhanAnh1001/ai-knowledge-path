version: "3.9"

# =============================================================================
# AI Wisdom Battle — Docker Compose (local dev + CI)
# Khởi động toàn bộ: docker compose up -d
# Chỉ infra (không build app): docker compose up -d postgres neo4j redis
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: awb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-ai_wisdom_battle}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_wisdom_battle}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awb-net

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: awb-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH:                       ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_dev}
      NEO4J_PLUGINS:                    '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size:     1G
      NEO4J_dbms_memory_pagecache_size:     512m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Browser UI
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/neo4j/seed.cypher:/var/lib/neo4j/import/seed.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - awb-net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: awb-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awb-net

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime             # multi-stage: chỉ dùng stage runtime
    container_name: awb-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE:   ${SPRING_PROFILES_ACTIVE:-dev}
      DB_URL:                   jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_wisdom_battle}
      DB_USER:                  ${POSTGRES_USER:-postgres}
      DB_PASSWORD:              ${POSTGRES_PASSWORD:-postgres}
      NEO4J_URI:                bolt://neo4j:7687
      NEO4J_USER:               ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD:           ${NEO4J_PASSWORD:-neo4j_dev}
      REDIS_HOST:               redis
      REDIS_PORT:               6379
      REDIS_PASSWORD:           ${REDIS_PASSWORD:-redis_dev}
      JWT_SECRET:               ${JWT_SECRET:-changeme-32-chars-minimum-secret!!}
      JWT_EXPIRATION_MS:        ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - awb-net

  # ── Neo4j Seeder (chạy 1 lần, seed knowledge graph) ────────────────────────
  neo4j-seeder:
    image: neo4j:5.18-community
    container_name: awb-neo4j-seeder
    entrypoint: >
      /bin/bash -c "
        echo 'Waiting for Neo4j...' &&
        sleep 20 &&
        cypher-shell -a bolt://neo4j:7687
                     -u ${NEO4J_USER:-neo4j}
                     -p ${NEO4J_PASSWORD:-neo4j_dev}
                     -f /import/seed.cypher &&
        echo 'Seed complete.'
      "
    volumes:
      - ./docs/neo4j-schema.cypher:/import/seed.cypher:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - awb-net
    restart: "no"       # chỉ chạy 1 lần

# =============================================================================
# Volumes & Networks
# =============================================================================

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  awb-net:
    driver: bridge
