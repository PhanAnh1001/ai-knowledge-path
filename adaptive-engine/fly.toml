# Fly.io config — AI Wisdom Battle (Python Adaptive Engine)
# Deploy: flyctl deploy --config adaptive-engine/fly.toml
# Secrets: flyctl secrets set --app awb-engine KEY=value ...

app            = "awb-engine"
primary_region = "sin"       # Cùng region với awb-backend để giảm latency

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8001"

[http_service]
  internal_port        = 8001
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0     # scale-to-zero: chỉ chạy khi có request

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/health"
    port         = 8001
    timeout      = "5s"
    type         = "http"
