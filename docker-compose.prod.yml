# =============================================================================
# AI Wisdom Battle — Docker Compose PRODUCTION (AWS Lightsail Singapore)
# 3 containers: postgres + go-app + caddy
# RAM usage: ~370-420 MB / 2 GB total
#
# Khởi động lần đầu:  docker compose -f docker-compose.prod.yml up -d
# Deploy code mới:    IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d app
# Xem logs:          docker compose -f docker-compose.prod.yml logs -f app
# =============================================================================

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: awb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    # KHÔNG expose port ra ngoài — chỉ app container mới kết nối được
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - awb-net

  # ── Go Backend ───────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/aiwisdombattle/backend-go:${IMAGE_TAG:-latest}
    container_name: awb-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:                "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      PORT:                        "8080"
      JWT_SECRET:                  ${JWT_SECRET}
      JWT_EXPIRATION_MS:           ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS:   ${JWT_REFRESH_EXPIRATION_MS:-2592000000}
      CORS_ALLOWED_ORIGINS:        ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_MAX:              ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW:           ${RATE_LIMIT_WINDOW:-60}
      MIGRATIONS_PATH:             /app/internal/db/migrations
    ports:
      - "127.0.0.1:8080:8080"
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - awb-net

  # ── Caddy (reverse proxy + auto TLS via Cloudflare DNS-01) ───────────────────
  caddy:
    image: ghcr.io/aiwisdombattle/caddy-cf:latest  # Caddy + Cloudflare DNS plugin
    container_name: awb-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      resources:
        limits:
          memory: 64m
    networks:
      - awb-net

volumes:
  pg_data:
  caddy_data:
  caddy_config:

networks:
  awb-net:
    driver: bridge
