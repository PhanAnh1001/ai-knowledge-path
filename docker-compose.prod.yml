# =============================================================================
# AI Wisdom Battle — Docker Compose PRODUCTION
#
# Sử dụng:
#   docker compose -f docker-compose.prod.yml up -d
#
# Yêu cầu:
#   - File .env với tất cả biến (xem .env.example)
#   - JWT_SECRET tối thiểu 32 ký tự ngẫu nhiên
#   - Tất cả password phải đổi từ giá trị mặc định
#
# Khác với docker-compose.yml (dev):
#   - Không expose port DB/Redis/Neo4j ra host (chỉ internal network)
#   - Resource limits cho mọi service
#   - Không có Swagger UI (springdoc.swagger-ui.enabled=false)
#   - SPRING_PROFILES_ACTIVE=prod
#   - Neo4j không expose browser UI (7474)
#   - restart: always (thay vì unless-stopped)
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: awb-postgres
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: awb-neo4j
    restart: always
    environment:
      NEO4J_AUTH:                       ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS:                    '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size:     1G
      NEO4J_dbms_memory_pagecache_size:     512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/neo4j/seed.cypher:/var/lib/neo4j/import/seed.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: awb-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 300M

  # ── Spring Boot App ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: awb-app:${APP_VERSION:-latest}
    container_name: awb-app
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE:    prod
      DB_URL:                    jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER:                   ${POSTGRES_USER}
      DB_PASSWORD:               ${POSTGRES_PASSWORD}
      NEO4J_URI:                 bolt://neo4j:7687
      NEO4J_USER:                ${NEO4J_USER}
      NEO4J_PASSWORD:            ${NEO4J_PASSWORD}
      REDIS_HOST:                redis
      REDIS_PORT:                6379
      REDIS_PASSWORD:            ${REDIS_PASSWORD}
      JWT_SECRET:                ${JWT_SECRET}
      JWT_EXPIRATION_MS:         ${JWT_EXPIRATION_MS:-86400000}
      ADAPTIVE_ENGINE_URL:       http://adaptive-engine:8001
      CORS_ALLOWED_ORIGINS:      ${CORS_ALLOWED_ORIGINS}
      RATE_LIMIT_AUTH_MAX:       ${RATE_LIMIT_AUTH_MAX:-20}
      JAVA_OPTS:                 "-XX:MaxRAMPercentage=75 -XX:+UseG1GC"
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 768M

  # ── Python Adaptive Engine ──────────────────────────────────────────────────
  adaptive-engine:
    build:
      context: ./adaptive-engine
      dockerfile: Dockerfile
    image: awb-adaptive-engine:${APP_VERSION:-latest}
    container_name: awb-adaptive-engine
    restart: always
    environment:
      JAVA_SERVICE_URL: http://app:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    image: awb-frontend:${APP_VERSION:-latest}
    container_name: awb-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_HTTPS_PORT:-443}:443"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - awb-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── Neo4j Seeder (chạy 1 lần) ───────────────────────────────────────────────
  neo4j-seeder:
    image: neo4j:5.18-community
    container_name: awb-neo4j-seeder
    entrypoint: >
      /bin/bash -c "
        echo 'Waiting for Neo4j...' &&
        sleep 20 &&
        cypher-shell -a bolt://neo4j:7687
                     -u ${NEO4J_USER}
                     -p ${NEO4J_PASSWORD}
                     -f /import/seed.cypher &&
        echo 'Seed complete.'
      "
    volumes:
      - ./docs/neo4j-schema.cypher:/import/seed.cypher:ro
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - awb-internal
    restart: "no"

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:

networks:
  awb-internal:
    driver: bridge
    internal: false   # set true nếu dùng reverse proxy (nginx/traefik) bên ngoài
