name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

# Hủy run cũ nếu có run mới cùng branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go Backend tests ─────────────────────────────────────────────────────────
  go-tests:
    name: Go Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend-go/go.sum

      - name: Run tests
        run: go test ./...
        working-directory: backend-go

      - name: Build binary
        run: go build -o /dev/null ./cmd/server
        working-directory: backend-go

  # ── Frontend tests ──────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

      - name: Build (type check + bundle)
        run: npm run build
        working-directory: frontend

  # ── Docker Compose validate ─────────────────────────────────────────────────
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

  # ── Build & push Docker image ───────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [go-tests, frontend-tests]
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase registry repo
        run: echo "GHCR_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Go backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-go
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPO }}/backend-go:latest
            ghcr.io/${{ env.GHCR_REPO }}/backend-go:${{ github.sha }}

  # ── Summary: tất cả job phải pass ──────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [go-tests, frontend-tests, docker-validate, build-docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.go-tests.result }}" != "success" ||
                "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          if [[ "${{ needs.build-docker.result }}" == "failure" ||
                "${{ needs.build-docker.result }}" == "cancelled" ]]; then
            echo "Docker build failed"
            exit 1
          fi
          echo "All CI jobs passed"
