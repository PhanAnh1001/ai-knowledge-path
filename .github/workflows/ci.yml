name: CI

on:
  push:
    branches: [master, "claude/**"]
  pull_request:
    branches: [master]

# Hủy run cũ nếu có run mới cùng branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Java Spring Boot tests ──────────────────────────────────────────────────
  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: java-surefire-reports
          path: target/surefire-reports/

  # ── Python Adaptive Engine tests ────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: adaptive-engine/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: adaptive-engine

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        working-directory: adaptive-engine

  # ── Frontend tests ──────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend

      - name: Build (type check + bundle)
        run: npm run build
        working-directory: frontend

  # ── Docker Compose validate ─────────────────────────────────────────────────
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Validate adaptive-engine Dockerfile
        run: docker build --no-cache --target builder . || docker build --no-cache .
        working-directory: adaptive-engine
        continue-on-error: true   # advisory — không block CI

  # ── Summary: tất cả job phải pass ──────────────────────────────────────────
  ci-pass:
    name: CI Pass
    needs: [java-tests, python-tests, frontend-tests, docker-validate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.java-tests.result }}" != "success" ||
                "${{ needs.python-tests.result }}" != "success" ||
                "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✓"
