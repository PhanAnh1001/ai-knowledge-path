name: Deploy

# Tự động deploy khi CI pass trên nhánh master
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# Secrets cần cấu hình trong GitHub → Settings → Secrets and variables → Actions:
#   FLY_API_TOKEN        — lấy từ: flyctl auth token
#   CLOUDFLARE_API_TOKEN — Cloudflare dashboard → My Profile → API Tokens
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare dashboard → bên phải màn hình chính

jobs:

  # ── Deploy Spring Boot lên Fly.io ───────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Fly.io)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Spring Boot
        run: flyctl deploy --remote-only --app awb-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy Python Engine lên Fly.io ─────────────────────────────────────────
  deploy-engine:
    name: Deploy Engine (Fly.io)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Adaptive Engine
        run: flyctl deploy --remote-only --app awb-engine --config adaptive-engine/fly.toml
        working-directory: adaptive-engine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ── Deploy React lên Cloudflare Pages ───────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          # URL backend Fly.io của bạn
          VITE_API_BASE_URL: https://awb-backend.fly.dev/api/v1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-wisdom-battle
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Tóm tắt kết quả ─────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-engine, deploy-frontend]
    if: always() && github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Report status
        run: |
          echo "Backend  : ${{ needs.deploy-backend.result }}"
          echo "Engine   : ${{ needs.deploy-engine.result }}"
          echo "Frontend : ${{ needs.deploy-frontend.result }}"

          if [[ "${{ needs.deploy-backend.result }}"  == "failure" ||
                "${{ needs.deploy-engine.result }}"   == "failure" ||
                "${{ needs.deploy-frontend.result }}" == "failure" ]]; then
            echo "❌ Một hoặc nhiều deploy thất bại"
            exit 1
          fi
          echo "✅ Tất cả deploy thành công"
