name: Deploy

# Tự động deploy khi CI pass trên nhánh master
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# ── Secrets cần thiết ──────────────────────────────────────────────────────────
#   LIGHTSAIL_HOST        — IPv6 address của AWS Lightsail instance
#   LIGHTSAIL_SSH_KEY     — Nội dung private key SSH (ed25519)
#   CLOUDFLARE_API_TOKEN  — CF token với quyền "Edit Cloudflare Pages"
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID
#
# ── Variables (Settings → Secrets and variables → Variables) ───────────────────
#   VITE_API_BASE_URL     — https://api.aiwisdombattle.com/api/v1

jobs:

  # ── Deploy Go backend lên AWS Lightsail ──────────────────────────────────────
  deploy-backend:
    name: Deploy to Lightsail (SSH)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy to Lightsail via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/ai-wisdom-battle

            echo "=== [1/4] Pull code ==="
            git fetch origin master
            git reset --hard origin/master

            echo "=== [2/4] Pull new image ==="
            GHCR_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]') \
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} \
              docker compose -f docker-compose.prod.yml pull app

            echo "=== [3/4] Restart app ==="
            GHCR_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]') \
            IMAGE_TAG=${{ github.event.workflow_run.head_sha }} \
              docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-deps app

            echo "=== [4/4] Health check ==="
            sleep 10
            curl -fsS http://localhost:8080/health | grep -q '"status":"UP"'
            echo "Backend deploy OK"

  # ── Deploy React frontend lên Cloudflare Pages ───────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-wisdom-battle
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # ── Tóm tắt kết quả ──────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always() && github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Report status
        run: |
          echo "Backend  : ${{ needs.deploy-backend.result }}"
          echo "Frontend : ${{ needs.deploy-frontend.result }}"

          if [[ "${{ needs.deploy-backend.result }}"  == "failure" ||
                "${{ needs.deploy-frontend.result }}" == "failure" ]]; then
            echo "Mot hoac nhieu deploy that bai"
            exit 1
          fi
          echo "Tat ca deploy thanh cong"
