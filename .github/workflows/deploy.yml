name: Deploy

# Tự động deploy khi CI pass trên nhánh master
# Hoặc trigger thủ công để test/debug
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

  # Trigger thủ công để test deploy trên feature branch
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: both
        type: choice
        options:
          - backend
          - frontend
          - both
      dry_run:
        description: "Dry-run (validate only, không deploy thật)"
        required: false
        default: true
        type: boolean
      ref_sha:
        description: "Git SHA để deploy (để trống = HEAD của branch hiện tại)"
        required: false
        default: ""
        type: string

# ── Secrets cần thiết ──────────────────────────────────────────────────────────
#   LIGHTSAIL_HOST        — Public IPv4 address của AWS Lightsail instance
#   LIGHTSAIL_SSH_KEY     — Nội dung private key SSH (ed25519)
#   CLOUDFLARE_API_TOKEN  — CF token với quyền "Edit Cloudflare Pages"
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Account ID
#
# ── Variables (Settings → Secrets and variables → Variables) ───────────────────
#   VITE_API_BASE_URL     — https://api.aiwisdombattle.com/api/v1

jobs:

  # ── Kiểm tra file thay đổi (chỉ chạy khi workflow_run) ───────────────────────
  # workflow_dispatch luôn bỏ qua job này, chạy thẳng vào deploy jobs
  check-changes:
    name: Check Deploy-Relevant Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Detect changed files
        id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          BE=$(echo "$CHANGED" | grep -qE \
            '^(backend-go/|docker-compose\.prod\.yml|Caddyfile|\.github/workflows/(deploy|ci)\.yml)' \
            && echo true || echo false)
          FE=$(echo "$CHANGED" | grep -qE \
            '^(frontend/|\.github/workflows/deploy\.yml)' \
            && echo true || echo false)

          echo "backend=$BE" >> $GITHUB_OUTPUT
          echo "frontend=$FE" >> $GITHUB_OUTPUT
          echo "backend-changed=$BE, frontend-changed=$FE"

  # ── Deploy Go backend lên AWS Lightsail ──────────────────────────────────────
  deploy-backend:
    name: Deploy to Lightsail (SSH)
    runs-on: ubuntu-latest
    needs: [check-changes]
    # Chạy khi: (a) workflow_dispatch target backend/both, hoặc (b) workflow_run + backend files changed
    if: >-
      always() && (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_target != 'frontend') ||
        (needs.check-changes.result == 'success' && needs.check-changes.outputs.backend == 'true')
      )

    permissions:
      packages: read
      contents: read

    steps:
      - name: Setup SSH key
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # Đảm bảo Docker được cài trên server (idempotent — skip nếu đã có)
      - name: Ensure Docker installed on server
        env:
          REMOTE_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_REPO: ${{ github.repository }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
        run: |
          # Validate required secrets before SSH
          if [ -z "${POSTGRES_PASSWORD}" ]; then
            echo "::error::POSTGRES_PASSWORD secret is not set. Run: gh secret set POSTGRES_PASSWORD --body \"\$(openssl rand -base64 24)\""
            exit 1
          fi
          if [ -z "${JWT_SECRET}" ]; then
            echo "::error::JWT_SECRET secret is not set. Run: gh secret set JWT_SECRET --body \"\$(openssl rand -base64 32)\""
            exit 1
          fi
          if [ -z "${API_DOMAIN}" ]; then
            echo "::error::API_DOMAIN variable is not set. Run: gh variable set API_DOMAIN --body \"<IP>.sslip.io\""
            exit 1
          fi

          GHCR_REPO_LC=$(echo "$GHCR_REPO" | tr '[:upper:]' '[:lower:]')

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "ubuntu@${REMOTE_HOST}" << ENDSSH
          set -e
          # --- Docker ---
          if sudo docker version &>/dev/null; then
            echo "Docker already installed: \$(sudo docker --version)"
          else
            echo "Docker not found, installing via official script..."
            sudo apt-get update -y
            sudo apt-get install -y ca-certificates curl git
            curl -fsSL https://get.docker.com | sudo sh
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ubuntu
            echo "Docker installed: \$(sudo docker --version)"
          fi
          # --- App directory ---
          if [ ! -d /opt/ai-knowledge-path/.git ]; then
            echo "Cloning repository..."
            sudo mkdir -p /opt/ai-knowledge-path
            sudo chown ubuntu:ubuntu /opt/ai-knowledge-path
            git clone --depth 1 https://x-access-token:${GHCR_TOKEN}@github.com/${GHCR_REPO}.git /opt/ai-knowledge-path
            echo "Repo cloned OK."
          else
            echo "Repo already exists."
          fi
          # --- .env from secrets (always overwrite to pick up secret rotations) ---
          # Use printf to avoid shell reinterpretation of special chars in values.
          {
            printf 'POSTGRES_DB=ai-knowledge-path\n'
            printf 'POSTGRES_USER=postgres\n'
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
            printf 'PORT=8080\n'
            printf 'DATABASE_URL=postgres://postgres:%s@postgres:5432/ai-knowledge-path\n' "${POSTGRES_PASSWORD}"
            printf 'JWT_SECRET=%s\n' "${JWT_SECRET}"
            printf 'JWT_EXPIRATION_MS=86400000\n'
            printf 'JWT_REFRESH_EXPIRATION_MS=2592000000\n'
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "${CORS_ALLOWED_ORIGINS}"
            printf 'RATE_LIMIT_MAX=20\n'
            printf 'RATE_LIMIT_WINDOW=60\n'
            printf 'CLOUDFLARE_API_TOKEN=%s\n' "${CLOUDFLARE_API_TOKEN}"
            printf 'API_DOMAIN=%s\n' "${API_DOMAIN}"
            printf 'GHCR_REPO=%s\n' "${GHCR_REPO_LC}"
            printf 'IMAGE_TAG=latest\n'
          } > /opt/ai-knowledge-path/.env
          chmod 600 /opt/ai-knowledge-path/.env
          echo ".env generated from secrets (\$(wc -l < /opt/ai-knowledge-path/.env) lines)"
          # Validate critical env vars were written
          for key in CORS_ALLOWED_ORIGINS API_DOMAIN JWT_SECRET DATABASE_URL; do
            grep -q "^\${key}=.\+" /opt/ai-knowledge-path/.env \
              || echo "::warning::\${key} is empty or missing in .env"
          done
          # --- Sync postgres password if container already running ---
          # Handles secret rotation: ALTER USER syncs the password without wiping data
          if sudo docker ps --format '{{.Names}}' 2>/dev/null | grep -q awb-postgres; then
            sudo docker exec awb-postgres psql -U postgres \
              -c "ALTER USER postgres PASSWORD '${POSTGRES_PASSWORD}'" 2>/dev/null \
              && echo "Postgres password synced." \
              || echo "Postgres not yet accepting connections (will start fresh)."
          fi
          ENDSSH

      # Dry-run: chỉ validate SSH connectivity + kiểm tra môi trường server
      - name: Dry-run — Validate SSH + server environment
        if: inputs.dry_run == true
        env:
          REMOTE_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          echo "=== Dry-run: Validate SSH + server environment ==="
          # SSH vào instance bằng public IPv4, dùng login shell để load đầy đủ PATH
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            "ubuntu@${REMOTE_HOST}" \
            "bash -l -c '
              set -e
              echo --- SSH: OK
              sudo docker --version
              sudo docker compose version
              df -h /
              ls /opt/ai-knowledge-path/ || echo /opt/ai-knowledge-path not found
              sudo docker ps --format \"{{.Names}}: {{.Status}}\" || true
            '"

      # Real deploy: chạy khi dry_run == false HOẶC khi trigger bằng workflow_run (production)
      - name: Deploy via SSH
        if: inputs.dry_run != true
        env:
          REMOTE_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_REPO: ${{ github.repository }}
          DEPLOY_SHA: ${{ inputs.ref_sha || github.event.workflow_run.head_sha || github.sha }}
        run: |
          # Validate DEPLOY_SHA to prevent command injection via user-supplied ref_sha input.
          # Only allow 40-char lowercase hex (git SHA format).
          if ! [[ "${DEPLOY_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid DEPLOY_SHA '${DEPLOY_SHA}'. Must be a 40-character lowercase hex git SHA."
            exit 1
          fi

          GHCR_REPO_LC=$(echo "$GHCR_REPO" | tr '[:upper:]' '[:lower:]')

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "ubuntu@${REMOTE_HOST}" << EOF
          set -euo pipefail
          cd /opt/ai-knowledge-path

          echo "=== [1/5] Login to GHCR ==="
          echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

          echo "=== [2/5] Pull code ==="
          git remote set-url origin https://x-access-token:${GHCR_TOKEN}@github.com/${GHCR_REPO}.git
          git fetch origin master
          git reset --hard origin/master
          # Remove token from .git/config so it doesn't persist on disk after this run
          git remote set-url origin https://github.com/${GHCR_REPO}.git

          echo "=== [3/5] Pull new images ==="
          sudo GHCR_REPO="${GHCR_REPO_LC}" IMAGE_TAG="${DEPLOY_SHA}" \
            docker compose --env-file .env -f docker-compose.prod.yml pull app
          sudo GHCR_REPO="${GHCR_REPO_LC}" \
            docker compose --env-file .env -f docker-compose.prod.yml pull caddy
          # Logout after pulling — credentials no longer needed and shouldn't stay in daemon config
          sudo docker logout ghcr.io

          echo "=== [4/5] Restart app ==="
          sudo GHCR_REPO="${GHCR_REPO_LC}" IMAGE_TAG="${DEPLOY_SHA}" \
            docker compose --env-file .env -f docker-compose.prod.yml up -d \
            --remove-orphans postgres app caddy

          echo "=== [5/5] Health check ==="
          sleep 20
          curl -fsS http://localhost:8080/health | grep -q '"status":"UP"'
          echo "Backend deploy OK"
          EOF

      # Tự động lấy log lỗi từ server khi deploy fail
      - name: Fetch remote logs on failure
        if: failure() && inputs.dry_run != true
        env:
          REMOTE_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          echo "=== Remote docker logs (last 50 lines) ==="
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            "ubuntu@${REMOTE_HOST}" \
            "sudo docker compose -f /opt/ai-knowledge-path/docker-compose.prod.yml logs --tail=50 app 2>&1 || true" \
            || echo "(Không thể SSH vào server để lấy logs)"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Deploy React frontend lên Cloudflare Pages ───────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [check-changes]
    # Chạy khi: (a) workflow_dispatch target frontend/both, hoặc (b) workflow_run + frontend files changed
    if: >-
      always() && (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_target != 'backend') ||
        (needs.check-changes.result == 'success' && needs.check-changes.outputs.frontend == 'true')
      )

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_sha || github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Real deploy lên Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        if: inputs.dry_run != true
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ai-knowledge-path
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Without branch, action deploys as preview (hash URL). Specify master so
          # Cloudflare Pages promotes this to production → ai-knowledge-path.pages.dev
          branch: master

      # Dry-run: build đã xong, bỏ qua deploy
      - name: Dry-run — Build OK, skipping Cloudflare deploy
        if: inputs.dry_run == true
        run: |
          echo "Dry-run mode — build succeeded, skipping Cloudflare Pages deploy"
          echo "Dist size: $(du -sh frontend/dist)"

      - name: Report failure context
        if: failure()
        run: |
          echo "Frontend deploy FAILED"
          echo "SHA: ${{ inputs.ref_sha || github.event.workflow_run.head_sha || github.sha }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ── Tóm tắt kết quả ──────────────────────────────────────────────────────────
  deploy-summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "Backend  : ${{ needs.deploy-backend.result }}"
          echo "Frontend : ${{ needs.deploy-frontend.result }}"
          echo "Trigger  : ${{ github.event_name }}"
          echo "Run URL  : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "${{ needs.deploy-backend.result }}"  == "failure" ||
                "${{ needs.deploy-frontend.result }}" == "failure" ]]; then
            echo "Mot hoac nhieu deploy that bai"
            exit 1
          fi
          echo "Tat ca deploy thanh cong (hoac skip)"
