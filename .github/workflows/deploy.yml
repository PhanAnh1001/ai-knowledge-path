name: Deploy

# Tự động deploy khi CI pass trên nhánh master
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# ── Secrets cần cấu hình (GitHub → Settings → Secrets and variables → Actions) ──
#   ORACLE_VM_IP          — Public IP của Oracle Cloud VM
#   ORACLE_SSH_KEY        — Nội dung private key SSH của user deploy
#                           (tạo bằng: ssh-keygen -t ed25519 -C "github-actions")
#                           Public key tương ứng thêm vào /home/deploy/.ssh/authorized_keys trên VM
#
# ── Variables (Settings → Variables) ──────────────────────────────────────────
#   (không cần thêm variable, SITE_ADDRESS nằm trong .env trên VM)

jobs:
  deploy:
    name: Deploy to Oracle Cloud VM
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      # QUAN TRỌNG: checkout đúng commit đã pass CI
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Cấu hình SSH ──────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.ORACLE_VM_IP }}" >> ~/.ssh/known_hosts

      # ── SSH vào VM: pull code + build frontend + rebuild containers ────────
      - name: Deploy
        env:
          VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            deploy@${VM_IP} << 'ENDSSH'
            set -euo pipefail
            cd /opt/ai-wisdom-battle

            echo "=== [1/5] Pull code ==="
            git fetch origin master
            git reset --hard origin/master

            echo "=== [2/5] Build frontend ==="
            cd frontend
            npm ci --prefer-offline
            npm run build
            cd ..

            echo "=== [3/5] Build app containers ==="
            docker compose -f docker-compose.prod.yml build app adaptive-engine

            echo "=== [4/5] Reload services ==="
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-deps app adaptive-engine caddy

            echo "=== [5/5] Health check ==="
            sleep 15
            curl -fsS http://localhost:8080/actuator/health | grep -q '"status":"UP"'
            echo "Deploy OK"
          ENDSSH

      # ── Báo kết quả ───────────────────────────────────────────────────────
      - name: Notify success
        if: success()
        run: echo "Deploy thanh cong len Oracle Cloud VM ${{ secrets.ORACLE_VM_IP }}"

      - name: Notify failure
        if: failure()
        run: echo "Deploy that bai — kiem tra logs tren VM"
