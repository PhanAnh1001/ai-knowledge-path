# =============================================================================
# Dev profile — dùng với local Docker Compose (docker/dev.sh infra)
# Kích hoạt: SPRING_PROFILES_ACTIVE=dev (mặc định trong docker-compose.yml)
# =============================================================================

spring:
  jpa:
    hibernate:
      ddl-auto: update       # dev: tự cập nhật schema (không dùng validate)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis trong dev — dùng container local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_dev}

# Adaptive Engine URL (Python FastAPI)
app:
  adaptive-engine:
    url: ${ADAPTIVE_ENGINE_URL:http://localhost:8001}

# Actuator: mở rộng thêm endpoints cho debug
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans,mappings
  endpoint:
    health:
      show-details: always

# Log chi tiết hơn trong dev
logging:
  level:
    root: INFO
    com.aiwisdombattle: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
