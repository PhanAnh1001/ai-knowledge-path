spring:
  application:
    name: ai-wisdom-battle

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_wisdom_battle}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate            # production: validate (schema managed by Flyway/Liquibase)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    store-type: redis
    redis:
      flush-mode: on-save

# ── JWT ────────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:changeme-at-least-32-chars-long!!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.aiwisdombattle: DEBUG
    org.springframework.security: WARN
