spring:
  application:
    name: ai-wisdom-battle

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_wisdom_battle}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none                # schema managed by Flyway
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Flyway ─────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  # ── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4j}

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  session:
    store-type: redis
    redis:
      flush-mode: on-save

# ── JWT ────────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:changeme-at-least-32-chars-long!!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24h
  adaptive-engine:
    url: ${ADAPTIVE_ENGINE_URL:http://localhost:8001}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  show-actuator: false

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.aiwisdombattle: DEBUG
    org.springframework.security: WARN
